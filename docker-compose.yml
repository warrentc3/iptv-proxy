version: "3"
services:
  iptv-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      # If you are using a local m3u file instead of a remote one,
      # put your m3u file in this folder.
      - ./iptv:/root/iptv
    container_name: "iptv-proxy"
    restart: on-failure
    ports:
      # Must match REWRITE_PORT.
      - 8080:8080
    environment:
      # SOURCE_* — what the proxy reads from.
      # If using a remote m3u, set SOURCE_M3U_URL: https://example.com/iptv.m3u
      SOURCE_M3U_URL: /root/iptv/iptv.m3u
      ## Xtream-Codes provider connection (uncomment / set as needed)
      # SOURCE_XC_BASE_URL: "http://provider.example.tv:8080"
      # SOURCE_XC_USER: xtream_user
      # SOURCE_XC_PASSWORD: xtream_password
      # SOURCE_XC_CACHED_M3U_TTL: 1            # hours
      # SOURCE_XC_APIGET_NOBACKCOMPAT: "true"  # opt into the modern /apiget that includes Series + VOD
      # SOURCE_UA_OVERRIDE: ""                 # set when the provider gates on a specific UA

      # PROXY_* — what the proxy exposes to the player.
      ##### UNSAFE DEFAULTS — set real values before exposing the proxy.
      PROXY_USER: test
      PROXY_PASSWORD: testpassword
      # PROXY_M3U: iptv.m3u                    # filename served as the player-facing M3U

      # REWRITE_* — what the proxy emits in URLs.
      REWRITE_HOSTNAME: localhost              # hostname/IP advertised to clients
      REWRITE_PORT: 8080                       # listen port (must match container ports mapping)
      # REWRITE_REVPROXY_PORT: 443             # set when behind a reverse proxy on a different external port
      # REWRITE_HTTPS: "true"                  # emit https:// (use behind TLS-terminating reverse proxy)

      GIN_MODE: release
