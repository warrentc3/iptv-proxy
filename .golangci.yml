# golangci-lint v2 config schema.
# Reference: https://golangci-lint.run/usage/configuration/

version: "2"

run:
  timeout: 5m

linters:
  # "standard" enables the default linter set: errcheck, govet,
  # ineffassign, staticcheck, unused. Sensible starter for a freshly
  # revived codebase. Add stricter linters (gosec, misspell, etc.)
  # under `enable:` once the default findings are triaged.
  default: standard
